site_name: agent-protocols
site_description: Go implementation of agent-to-agent communication protocols
site_url: https://aistandardsio.github.io/agent-protocols/
repo_url: https://github.com/aistandardsio/agent-protocols
repo_name: aistandardsio/agent-protocols

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (AIStandards.io default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - https://aistandardsio.github.io/css/aistandardsio-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - AAuth:
    - Overview: aauth/overview.md
    - Getting Started: aauth/getting-started.md
    - Examples: aauth/examples.md
    - Diagrams: aauth/diagrams.md
    - API Reference: aauth/api-reference.md
  - ID-JAG:
    - Overview: idjag/protocol-overview.md
    - Getting Started: idjag/getting-started.md
    - Examples: idjag/examples.md
    - Diagrams: idjag/diagrams.md
    - API Reference: idjag/api-reference.md
    - Presentations:
      - Introduction: idjag/presentations/idjag-intro.md
  - AIMS:
    - Overview: aims/overview.md
    - Getting Started: aims/getting-started.md
    - Examples: aims/examples.md
    - Diagrams: aims/diagrams.md
    - API Reference: aims/api-reference.md
  - Adapters:
    - Zitadel:
      - Overview: adapters/zitadel/overview.md
      - Getting Started: adapters/zitadel/getting-started.md
      - Examples: adapters/zitadel/examples.md
      - API Reference: adapters/zitadel/api-reference.md
  - Releases:
    - v0.2.0: releases/v0.2.0.md
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aistandardsio/agent-protocols

plugins:
  - search
