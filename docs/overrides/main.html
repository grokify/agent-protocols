{% extends "base.html" %}

  customElements.whenDefined('lit-navbar').then(() => {

    navbar.config = {
      baseUrl: 'https://aistandardsio.github.io',
      brand: {
        logoUrl: 'https://aistandardsio.github.io/icon.png',
        logoAlt: 'AIStandards.io',
        title: 'AI',
        titleSecondary: 'Standards.io',
        titleGradient: true,
        homeUrl: 'https://aistandardsio.github.io'
      },
      menu: [
        {
          type: 'dropdown',
          label: 'Protocols',
          items: [
            { label: 'AAuth', url: 'https://aistandardsio.github.io/agent-protocols/aauth/overview/' },
            { label: 'ID-JAG', url: 'https://aistandardsio.github.io/agent-protocols/idjag/protocol-overview/' },
            { label: 'AIMS', url: 'https://aistandardsio.github.io/agent-protocols/aims/overview/' }
          ]

        {

        url: 'https://github.com/aistandardsio',
        label: 'GitHub'
      },
      theme: {
        primaryColor: '#ff6b00',
        secondaryColor: '#00d4ff',
        backgroundColor: '#0a0a0f',
        textColor: '#e4e4ed',
        mutedColor: '#8888a0',
        borderColor: '#1e1e2e',
        titleGradient: 'linear-gradient(135deg, #ff6b00, #00d4ff)'
      }
    };
  });
